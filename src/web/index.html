<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict CSP for Phase 1 of the playground. Everything we ship is
      first-party: the page chrome script, CodeMirror, JSZip, the
      coi-serviceworker shim. Worker scripts (BasiliskII) are spawned
      from same-origin URLs. The emulator pulls the disk image and
      worker JS from the same origin too.

      `default-src 'self'` covers img/font/style/connect by inheritance;
      we explicitly set `script-src 'self'` to make the no-inline-script
      story unambiguous, `object-src 'none'` to disable plugins, and
      `base-uri 'none'` to lock the document base URL.

      Three carve-outs:
        - `worker-src 'self' blob:` — Emscripten/BasiliskII can construct
          worker URLs from Blob objects in some code paths.
        - `connect-src 'self' https:` — MacWeather hits api.open-meteo.com
          from the page-side fetch. Without this carve-out the live
          forecast wouldn't load. https-only.
        - `script-src 'self' 'wasm-unsafe-eval'` — Phase 2 of the
          playground (Issue #21) ships the WASM-Rez resource compiler
          which Emscripten loads via `WebAssembly.instantiate()`. Under
          a strict `script-src 'self'` (no `unsafe-eval`) the browser
          aborts WASM compilation. The CSP3 `'wasm-unsafe-eval'`
          token specifically permits WebAssembly compilation while still
          blocking `eval()` proper — that's what we want. Browser
          support: Chrome 102+, Firefox 116+, Safari 16+. Older browsers
          treat the unknown source as ignored and reject WASM with the
          same error; users on those browsers don't get the Build
          button. Acceptable tradeoff for staying off `unsafe-eval`.

      If a future change needs full `unsafe-eval`, document the reason
      in LEARNINGS.md before relaxing.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; connect-src 'self' https:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none';"
    />
    <title>classic-vibe-mac — write Mac OS apps in your browser</title>
    <meta
      name="description"
      content="A 1990s Macintosh that lives at a URL. System 7.5.5 boots in your browser; 21 sample apps you can edit, hit Build, and watch the Mac re-launch with your changes. Compiles C end-to-end client-side via wasm-retro-cc."
    />

    <!-- Open Graph / Facebook / iMessage / Slack share previews. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="classic-vibe-mac" />
    <meta property="og:title" content="classic-vibe-mac — write Mac OS apps in your browser" />
    <meta property="og:description" content="System 7.5.5 boots in your tab. Edit a sample's C source, hit Build & Run, and the Mac re-launches ~1 second later with your changes — no server, no install, no reload." />
    <meta property="og:url" content="https://khawkins98.github.io/classic-vibe-mac/" />
    <meta property="og:image" content="https://khawkins98.github.io/classic-vibe-mac/screenshot-deployed.png" />
    <meta property="og:image:alt" content="A Mac OS 7/8-style IDE in the browser: top menubar with Apple / File / Edit / View / Special / Windows / Help, a cv-mac build stamp, and a clock. Four draggable WinBox panes tile the viewport: Project picker (left), Playground with Build / Build & Run / Download / Reset toolbar above a CodeMirror editor (centre), Macintosh pane running System 7.5.5 in BasiliskII (right), Output panel with the Build Log (bottom right)." />

    <!-- Twitter / X large-image card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="classic-vibe-mac — write Mac OS apps in your browser" />
    <meta name="twitter:description" content="System 7.5.5 boots in your tab. Edit a sample's C source, hit Build & Run, and the Mac re-launches ~1 second later with your changes." />
    <meta name="twitter:image" content="https://khawkins98.github.io/classic-vibe-mac/screenshot-deployed.png" />

    <!-- Match the Mac OS 8 Platinum chrome for mobile browser surrounds. -->
    <meta name="theme-color" content="#cccccc" />
    <link rel="stylesheet" href="/src/style.css" />
    <!--
      coi-serviceworker (MIT, gzuidhof/coi-serviceworker) — installs a
      service worker that re-issues navigation responses with the
      Cross-Origin-Opener-Policy and Cross-Origin-Embedder-Policy
      headers BasiliskII WASM needs for SharedArrayBuffer. GitHub Pages
      cannot set those response headers itself; the SW shim is the
      documented workaround. Vite dev sets the headers at the server
      level (see vite.config.ts), so this is a no-op there.

      Important: this MUST be loaded BEFORE the app script. The first
      visit registers the SW and the page is reloaded once with the
      headers in place — that's when crossOriginIsolated becomes true.
    -->
    <script src="./coi-serviceworker.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
