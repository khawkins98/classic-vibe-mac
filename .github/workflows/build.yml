name: Build

# Build the Mac 68k app, package it with the Vite-built web frontend, and
# publish to GitHub Pages on pushes to main. PRs and feature branches still
# run the build (for CI signal) but skip the deploy job — we don't want
# every PR redeploying production.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege defaults for the workflow. The `deploy` job overrides this
# locally with `pages: write` + `id-token: write` (required by
# actions/deploy-pages OIDC handshake).
permissions:
  contents: read

# Serialize Pages deploys: only one in flight at a time per ref. We
# intentionally do NOT cancel in-progress runs (`cancel-in-progress: false`)
# because killing a half-finished `actions/deploy-pages` step can leave the
# Pages environment in a wedged state. Better to queue.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-app:
    name: Cross-compile classic Mac apps (68k)
    runs-on: ubuntu-latest

    # Official Retro68 image, rebuilt on every commit to Retro68 master.
    # The toolchain lives at /Retro68-build/toolchain inside the container.
    # Pulling the prebuilt image is dramatically faster (and simpler) than
    # building Retro68 from source (~2GB toolchain, ~hour-long build).
    container:
      image: ghcr.io/autc04/retro68:latest

    steps:
      - uses: actions/checkout@v6

      # Install hfsutils into the Retro68 container so scripts/build-disk-image.sh
      # can produce our custom app.dsk. The Retro68 image is Debian-based and runs
      # as root in GH Actions (no sudo needed / available). hfsutils is the classic
      # HFS toolkit (hformat/hmount/hcopy); do NOT substitute hfsprogs — that is
      # HFS+ and Basilisk II / classic Mac OS cannot read it (see LEARNINGS.md).
      - name: Install hfsutils
        run: |
          apt-get update
          apt-get install -y --no-install-recommends hfsutils

      - name: Configure (CMake + Retro68 toolchain)
        run: |
          cmake -S src/app -B build \
            -DCMAKE_TOOLCHAIN_FILE=/Retro68-build/toolchain/m68k-apple-macos/cmake/retro68.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      # Sanity check. The .APPL file is the data fork only and may be 0 bytes
      # for resource-only apps — the canonical artifacts are .bin (MacBinary,
      # both forks) and .dsk (mountable HFS image with the app inside).
      # Multi-app: each subdirectory of build/ is its own app's output.
      - name: Verify build artifacts
        run: |
          ls -la build/
          ls -la build/reader/
          ls -la build/macweather/
          ls -la build/hello-mac/
          ls -la build/pixelpad/
          test -s build/reader/Reader.bin
          test -s build/reader/Reader.dsk
          test -s build/macweather/MacWeather.bin
          test -s build/macweather/MacWeather.dsk
          test -s build/hello-mac/HelloMac.bin
          test -s build/hello-mac/HelloMac.dsk
          test -s build/pixelpad/PixelPad.bin
          test -s build/pixelpad/PixelPad.dsk

      # Pack the compiled Reader MacBinary into our own HFS disk image.
      # Feeds the .bin (MacBinary, both forks intact) — NOT the .APPL
      # (data-fork-only, frequently 0 bytes for resource-only apps). hcopy
      # -m inside the script decodes MacBinary back into a real two-fork
      # HFS file on the volume. (app.dsk is currently Reader-only; the
      # boot disk below carries every app.)
      - name: Build custom app.dsk (HFS disk image with Startup Items)
        run: |
          mkdir -p dist
          ./scripts/build-disk-image.sh build/reader/Reader.bin dist/app.dsk
          ls -la dist/
          test -s dist/app.dsk

      # Bake a bootable System 7.5.5 hard-disk image with our app pre-injected
      # into :System Folder:Startup Items: . This is the path forward for
      # auto-launch (PRD §Auto-launch) — System 7's Finder only auto-runs
      # Startup Items from the boot volume's blessed System Folder, so the
      # only way to make our app launch on boot without hand-driving the
      # emulator is to MAKE the boot volume be ours. See LEARNINGS.md
      # ("Boot disk: build our own…") for the long version.
      #
      # IMPORTANT: this disk is built but NOT yet consumed by the page —
      # the BasiliskII WASM core needs hundreds of lines of worker glue
      # we haven't ported (EmulatorWorkerApi, video/input/audio/disk
      # callback channels, BasiliskIIPrefs.txt template, device-image
      # header). The disk is shipped now so it's ready when the worker
      # glue lands; until then the loader stays in STUB mode. Building it
      # in CI also exercises the hfsutils + download path so it doesn't
      # rot before the port is done.
      #
      # Cache the cached upstream image across runs to avoid hitting
      # archive.org on every push; the cache key is the BOOT_DISK_URL pin
      # (effectively constant within a SHA pin in the script).
      - name: Cache upstream System 7.5.5 image
        uses: actions/cache@v5
        with:
          path: .cache/boot-disk
          key: boot-disk-system755-v1

      - name: Build bootable System 7.5.5 disk (apps pre-installed)
        # `set +e` because the SHA-256 pin is currently a placeholder; the
        # script prints the observed hash and continues unverified the
        # first time. After the first successful CI run, paste the hash
        # back into BOOT_DISK_SHA256 in the script and remove this `|| true`.
        # Track in PRD risks table.
        #
        # The first arg is comma-separated; build-boot-disk.sh installs
        # every binary into :Applications: (user-launchable from the
        # desktop) and the LAST one in the list also into Startup Items
        # (auto-launch on boot — also ends up the front-most app).
        # Order matters: MacWeather is last so it's the front-most app
        # after boot, with Reader, HelloMac and PixelPad available via
        # :Applications:.
        run: |
          ./scripts/build-boot-disk.sh \
            build/reader/Reader.bin,build/hello-mac/HelloMac.bin,build/pixelpad/PixelPad.bin,build/macweather/MacWeather.bin \
            dist/system755-vibe.dsk || {
            status=$?
            echo "::warning::build-boot-disk.sh exited non-zero ($status). Continuing — see PRD risks."
          }
          if [ -s dist/system755-vibe.dsk ]; then
            ls -la dist/system755-vibe.dsk
            echo "::notice::system755-vibe.dsk built ($(stat -c%s dist/system755-vibe.dsk) bytes)"
          else
            echo "::warning::system755-vibe.dsk was not produced. Web build will proceed without it (loader stays in STUB mode regardless)."
          fi

      # Verify the .code.bin precompiles emit. Track 7 of Phase 2 splices a
      # freshly-WASM-Rez-compiled resource fork onto these data-fork-only
      # MacBinaries to produce a downloadable .bin in the playground. The
      # CMake `Retro68_CreateApp` macro produces them as a side-effect (see
      # build/<app>/<App>.code.bin) — we just assert they exist and ship
      # them as static assets next to the web bundle.
      - name: Verify .code.bin precompiles (playground splice inputs)
        run: |
          test -s build/reader/Reader.code.bin
          test -s build/macweather/MacWeather.code.bin
          test -s build/hello-mac/HelloMac.code.bin
          ls -la build/reader/Reader.code.bin build/macweather/MacWeather.code.bin build/hello-mac/HelloMac.code.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: classic-vibe-mac-${{ github.sha }}
          path: |
            build/reader/Reader.bin
            build/reader/Reader.code.bin
            build/reader/Reader.dsk
            build/reader/Reader.APPL
            build/macweather/MacWeather.bin
            build/macweather/MacWeather.code.bin
            build/macweather/MacWeather.dsk
            build/macweather/MacWeather.APPL
            build/hello-mac/HelloMac.bin
            build/hello-mac/HelloMac.code.bin
            build/hello-mac/HelloMac.dsk
            build/hello-mac/HelloMac.APPL
            dist/app.dsk
            dist/system755-vibe.dsk
            dist/system755-vibe.dsk.json
            dist/system755-vibe-chunks/**
          if-no-files-found: warn
          retention-days: 14

  build-web:
    name: Build web frontend (Vite)
    needs: build-app
    # Plain ubuntu-latest, NOT the Retro68 container — the web build only
    # needs Node, and pulling Retro68 (~2GB) for `npm ci && vite build` is
    # pure waste. The 68k toolchain is already done by the time we get here.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      # Pull the artifact from build-app so we can co-locate dist/app.dsk
      # next to the Vite output. Downloads to ./artifact/ preserving the
      # original directory structure (build/, dist/).
      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: classic-vibe-mac-${{ github.sha }}
          path: artifact

      - name: Verify downloaded app.dsk
        run: |
          ls -la artifact/dist/
          test -s artifact/dist/app.dsk
          # system755-vibe.dsk is best-effort right now (see build-app job
          # for why) — log its presence/absence but don't fail.
          if [ -s artifact/dist/system755-vibe.dsk ]; then
            echo "system755-vibe.dsk present ($(stat -c%s artifact/dist/system755-vibe.dsk) bytes)."
          else
            echo "system755-vibe.dsk missing or empty — loader will stay in STUB mode."
          fi

      - name: Install dependencies
        # Root-level npm ci: workspaces handle src/web automatically.
        run: npm ci

      # The emulator-integration-engineer is adding scripts/fetch-emulator.sh
      # in parallel; until it lands we proceed without it. Vite build will
      # still produce a usable site shell — the emulator core just won't be
      # bundled. Defensive: check both the script file and the npm script.
      - name: Fetch emulator binaries (if available)
        run: |
          if [ -f scripts/fetch-emulator.sh ]; then
            echo "Found scripts/fetch-emulator.sh — running."
            bash scripts/fetch-emulator.sh
          elif npm run | grep -qE '^\s*fetch:emulator\b'; then
            echo "Found npm script fetch:emulator — running."
            npm run fetch:emulator
          else
            echo "No emulator fetch script present yet — skipping (web build will still produce a site shell)."
          fi

      # GH Pages serves project sites under /<repo-name>/. Vite needs to know
      # this at build time so asset URLs (and therefore <link>/<script>/asset
      # imports) resolve correctly. Derived from the repo name so a fork
      # that renames the repo just works without editing the workflow.
      - name: Build web frontend
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          # Validate VITE_BASE is a root-relative path (e.g. /repo-name/).
          # Rejects absolute URLs like https://attacker.com/ which would
          # redirect all WASM/ROM/disk fetches to an attacker-controlled host.
          if [[ ! "$VITE_BASE" =~ ^/[^/].*/$ ]]; then
            echo "ERROR: VITE_BASE must be a root-relative path (e.g. /classic-vibe-mac/). Got: '$VITE_BASE'"
            exit 1
          fi
          npm run build

      # Verify the vendored prebuilt WASM-Rez blobs are present and roughly
      # the right size. We ship them committed to git (Track 1b of Issue
      # #30) rather than rebuilding emsdk in CI; this step exists to flag
      # if someone accidentally deletes them or commits a wildly-wrong
      # build (e.g. the unstripped debug build is ~10x bigger).
      - name: Verify WASM-Rez vendored artifacts
        run: |
          test -s src/web/public/wasm-rez/wasm-rez.js
          test -s src/web/public/wasm-rez/wasm-rez.wasm
          test -s src/web/public/wasm-rez/RIncludes/Multiverse.r
          js_size=$(stat -c%s src/web/public/wasm-rez/wasm-rez.js)
          wasm_size=$(stat -c%s src/web/public/wasm-rez/wasm-rez.wasm)
          echo "wasm-rez.js   = $js_size B"
          echo "wasm-rez.wasm = $wasm_size B"
          # Sanity bounds. The spike was 73KB JS / 316KB WASM. If anything
          # ever goes 5x off, fail loudly so we notice.
          if [ "$wasm_size" -lt 100000 ] || [ "$wasm_size" -gt 2000000 ]; then
            echo "::error::wasm-rez.wasm size ($wasm_size B) is wildly off the ~316 KB target"
            exit 1
          fi
          gz_size=$(gzip -9c src/web/public/wasm-rez/wasm-rez.wasm | wc -c)
          echo "wasm-rez.wasm.gz = $gz_size B"

      # Co-locate the .code.bin precompiles next to index.html so the
      # playground's Build button can fetch them at
      # /<repo>/precompiled/<project>.code.bin and splice the fresh
      # resource fork on top. Done AFTER `npm run build` (analogous to
      # how the disk images are placed below) because the artifact is
      # downloaded into ./artifact/ AFTER `npm ci` but the previous
      # ordering ran this step after vite had already finished — so the
      # files never made it into dist/. See LEARNINGS.md
      # ("Phase-2 precompiled .code.bin missing in production").
      - name: Co-locate .code.bin precompiles into web dist
        run: |
          mkdir -p src/web/dist/precompiled
          cp artifact/build/reader/Reader.code.bin src/web/dist/precompiled/reader.code.bin
          cp artifact/build/macweather/MacWeather.code.bin src/web/dist/precompiled/macweather.code.bin
          cp artifact/build/hello-mac/HelloMac.code.bin src/web/dist/precompiled/hello-mac.code.bin
          ls -la src/web/dist/precompiled/
          test -s src/web/dist/precompiled/reader.code.bin
          test -s src/web/dist/precompiled/macweather.code.bin
          test -s src/web/dist/precompiled/hello-mac.code.bin

      # Co-locate the disk images next to index.html so they're reachable at
      # https://<user>.github.io/<repo>/app.dsk and /system755-vibe.dsk —
      # which is where emulator-config.ts expects to find them. Done outside
      # Vite (rather than via publicDir) because the .dsk files are CI
      # artifacts, not source assets, and we don't want them tracked in git.
      - name: Co-locate disk images into web dist
        run: |
          cp artifact/dist/app.dsk src/web/dist/app.dsk
          if [ -s artifact/dist/system755-vibe.dsk ]; then
            cp artifact/dist/system755-vibe.dsk src/web/dist/system755-vibe.dsk
          fi
          # The chunked manifest + chunks are what the loader actually
          # consumes (the single-file .dsk is kept for HEAD-checking and
          # for forks that may want to re-chunk locally). See
          # src/web/src/emulator-worker.ts ChunkedDisk for the read path.
          if [ -s artifact/dist/system755-vibe.dsk.json ]; then
            cp artifact/dist/system755-vibe.dsk.json src/web/dist/system755-vibe.dsk.json
          fi
          if [ -d artifact/dist/system755-vibe-chunks ]; then
            cp -R artifact/dist/system755-vibe-chunks src/web/dist/system755-vibe-chunks
          fi
          ls -la src/web/dist/
          test -s src/web/dist/app.dsk

      # Hand off to the Pages deploy job via the official Pages artifact
      # contract. upload-pages-artifact tars the directory with the right
      # metadata that deploy-pages expects on the other side.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: src/web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    # Gate the deploy on main + non-PR. PRs from forks shouldn't be able to
    # publish to production Pages, and feature-branch pushes shouldn't either.
    # build-app and build-web still run on those — only the deploy is gated.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write       # publish to the Pages environment
      id-token: write    # OIDC token for deploy-pages to authenticate

    # Wires the deployment URL into the workflow run summary and gives us
    # the standard Pages environment protections.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # NOTE on cross-origin isolation: GitHub Pages does not serve
      # COOP/COEP response headers, and SharedArrayBuffer (which BasiliskII
      # WASM may need) requires a cross-origin-isolated context. The web
      # frontend is expected to ship a service-worker shim (e.g.
      # `coi-serviceworker`) to install the headers client-side. If the
      # emulator fails to boot in production with a SAB error, that's the
      # likely cause — see PRD.md "GitHub Pages Deployment". Owner of the
      # fix is the emulator-integration-engineer; this job just flags it.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

# TODO — remaining pipeline pieces from PRD.md, to be wired up by follow-up PRs:
#   - Auto-launch: Startup Items on a secondary disk doesn't fire (see
#     LEARNINGS.md). Either inject the app into the boot disk's System Folder
#     at emulator-config time, or ship a custom blessed boot disk. (owner:
#     emulator agent)
