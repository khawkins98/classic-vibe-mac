name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: unit (host C + JS preprocessor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      # The C suite needs nothing but cc; the JS preprocessor.test.mjs
      # invokes `tsc` from the workspace, so we install deps too.
      - name: Install dependencies
        run: npm ci
      - name: Run host-compiled C unit tests + JS preprocessor tests
        run: npm run test:unit

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual:
    name: visual (vision LLM)
    runs-on: ubuntu-latest
    # Only run if the API key secret is present. Forks and contributors
    # without access will see this job skipped, not failed.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run vision tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not set — skipping vision tests."
            exit 0
          fi
          npm run test:visual
